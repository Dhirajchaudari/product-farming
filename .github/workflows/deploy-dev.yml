name: Deploy backend 

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-product-farming-backend-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_ENV_B64: ${{ secrets.SERVER_ENV_B64 }}
      SERVER_PUBLIC_HEALTH_URL: ${{ vars.SERVER_PUBLIC_HEALTH_URL }}
      SERVER_DEPLOY_BASE: ${{ vars.SERVER_DEPLOY_BASE }}
    steps:
      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USER }}
          key: ${{ secrets.DEV_VM_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          request_pty: true
          envs: SERVER_ENV_B64,SERVER_PUBLIC_HEALTH_URL,SERVER_DEPLOY_BASE
          script_stop: false
          script: |
            set -euo pipefail
            BASE="${SERVER_DEPLOY_BASE:-/home/ubuntu/apps/product-farming/server}"
            mkdir -p "$BASE"
            cd "$BASE"

            BRANCH='${{ github.ref_name }}'
            if [ -d .git ]; then
              git fetch origin
            else
              git clone "https://github.com/${{ github.repository }}.git" .
            fi
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${SERVER_ENV_B64:-}" ]; then
              echo "$SERVER_ENV_B64" | base64 -d > .env.production
              chmod 600 .env.production
              sed -i 's/\r$//' .env.production
            fi

            : "${SERVER_PUBLIC_HEALTH_URL:=https://api.orbitalops.net/health}"
            export PF_ENV_FILE=.env.production
            export PF_PUBLIC_HEALTH_URL="$SERVER_PUBLIC_HEALTH_URL"
            export PF_IMAGE_TAG='${{ github.sha }}'
            export PF_BLUE_PORT=18081
            export PF_GREEN_PORT=28081
            export PF_BLUE_CONTAINER=product-farming-api-blue
            export PF_GREEN_CONTAINER=product-farming-api-green
            export PF_NGINX_UPSTREAM_FILE=/etc/nginx/conf.d/product-farming-api-upstream.conf
            export PF_NGINX_UPSTREAM_NAME=product_farming_api_active
            export PF_DRAIN_SECONDS=20

            bash script/deploy-bluegreen.sh
